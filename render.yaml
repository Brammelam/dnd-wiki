services:
  - type: web
    name: dnd-wiki
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: .vitepress/dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
